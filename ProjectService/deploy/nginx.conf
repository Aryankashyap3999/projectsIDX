# Reverse proxy for ProjectService (Express + Socket.IO) with WebSocket upgrade.
# Place in /etc/nginx/sites-available/project-service and symlink into sites-enabled.
# Replace your-domain.com, then run certbot to add TLS:
#   sudo certbot --nginx -d your-domain.com

upstream project_service {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    server_name your-domain.com;

    # Allow large payloads (file trees, editor content).
    client_max_body_size 25m;

    location / {
        proxy_pass http://project_service;
        proxy_http_version 1.1;

        # Required for Socket.IO / raw WebSocket (xterm terminal, editor sync).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived sockets: don't cut idle connections early.
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
